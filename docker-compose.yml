version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: foodie_tour_db
    environment:
      POSTGRES_DB: foodie_tour
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
